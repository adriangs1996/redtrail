[package]
name = "redtrail"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rt"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
colored = "3"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
rusqlite = { version = "0.39", features = ["bundled"] }
dirs = "6"
aisdk = { version = "0.5", features = ["anthropic", "openaichatcompletions"] }
schemars = "1"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
url = "2"
toml = "1.0"
portable-pty = "0.9"
dialoguer = "0.12"
async-trait = "0.1.89"
async-stream = "0.3.6"

[dev-dependencies]
tempfile = "3"

[features]
integration = []
